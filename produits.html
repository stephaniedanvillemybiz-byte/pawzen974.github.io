<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Produits | Pawzen974</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f4fbfa;color:#12323a}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    a{text-decoration:none;color:#2d8f8b}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .card{background:#fff;border:1px solid #e2eeed;border-radius:20px;overflow:hidden;box-shadow:0 12px 30px rgba(20,52,59,.06)}
    .ph{height:180px;background:linear-gradient(180deg,#eaf8f7,#fff3e1);display:grid;place-items:center;font-size:56px}
    .body{padding:16px}
    .price{color:#2d8f8b;font-weight:800}
    @media(max-width:800px){.grid{grid-template-columns:1fr 1fr}}
    @media(max-width:560px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Nos produits</h1>
      <a href="./index.html">← Retour à l’accueil</a>
    </div>
    <div class="grid">
      <div class="card"><div class="ph">🦴</div><div class="body"><strong>Harnais confort</strong><p>Réglable et doux.</p><div class="price">24,90 €</div></div></div>
      <div class="card"><div class="ph">🍽️</div><div class="body"><strong>Gamelle anti-glisse</strong><p>Pratique au quotidien.</p><div class="price">14,90 €</div></div></div>
      <div class="card"><div class="ph">🛏️</div><div class="body"><strong>Panier douillet</strong><p>Pour des siestes paisibles.</p><div class="price">39,90 €</div></div></div>
    </div>
  </div>
</body>
</html>
